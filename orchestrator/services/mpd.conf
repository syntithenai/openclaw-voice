# Bundled MPD configuration for orchestrator-managed MPD inside the app container.
# Uses container-local state paths and a shared FIFO mount for optional Snapserver.

music_directory "/music"
playlist_directory "/tmp/openclaw-mpd/playlists"
db_file "/tmp/openclaw-mpd/database"
log_file "/tmp/openclaw-mpd/mpd.log"
pid_file "/tmp/openclaw-mpd/mpd.pid"
state_file "/tmp/openclaw-mpd/state"
sticker_file "/tmp/openclaw-mpd/sticker.sql"

bind_to_address "127.0.0.1"
port "6600"
default_permissions "read,add,control,admin"

# Prefer direct ALSA inside the orchestrator container when /dev/snd is present.
audio_output {
    type "alsa"
    name "ALSA Output"
    mixer_type "software"
}

# Optional desktop socket route for PipeWire/PulseAudio-based container profiles.
audio_output {
    type "pulse"
    name "PulseAudio Output"
    server "unix:/tmp/pulse/native"
    mixer_type "software"
}

# Shared output for Snapserver or other consumers.
audio_output {
    type "fifo"
    name "Orchestrator FIFO Output"
    path "/tmp/mpd-fifo/music.pcm"
    format "44100:16:2"
    mixer_type "none"
}

decoder {
    plugin "wildmidi"
    enabled "no"
}

log_level "default"
auto_update "yes"
restore_paused "yes"
save_absolute_paths_in_playlists "no"
audio_buffer_size "4096"
buffer_before_play "10%"
