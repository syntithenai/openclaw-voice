# MPD Configuration File
# See: https://mpd.readthedocs.io/en/latest/user.html

# Music directory - mounted from host
music_directory "/music"

# State files directory - persistent Docker volume
playlist_directory "/var/lib/mpd/playlists"
db_file "/var/lib/mpd/database"
log_file "/var/log/mpd/mpd.log"
pid_file "/run/mpd/mpd.pid"
state_file "/var/lib/mpd/state"
sticker_file "/var/lib/mpd/sticker.sql"

# Network settings - bind to all interfaces to allow orchestrator to connect
bind_to_address "0.0.0.0"
port "6600"

# Unix socket (optional, for local connections within container)
bind_to_address "/run/mpd/socket"

# Permissions - allow full control from clients
# password "@read,add,control,admin"  # Empty password with all permissions
default_permissions "read,add,control,admin"

# Audio output - PulseAudio for desktop integration
audio_output {
    type "pulse"
    name "PulseAudio Output"
    server "/tmp/pulse/native"
}

# Logging
log_level "default"

# Auto-update database when files change (requires inotify)
auto_update "yes"

# Metadata to MPD database - improves search performance
metadata_to_use "artist,album,title,track,name,genre,date,composer,performer,disc,albumartist"

# Client connection timeout (seconds)
connection_timeout "60"

# Maximum number of command list items
max_command_list_size "2048"

# Maximum number of simultaneous connections
max_connections "10"

# Restore paused state on startup
restore_paused "yes"

# Save state periodically
save_absolute_paths_in_playlists "no"

# Buffering
audio_buffer_size "4096"
buffer_before_play "10%"
